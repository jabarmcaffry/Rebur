<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Avatar – Full Character</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; background: radial-gradient(circle at 30% 20%, #0f0f22, #02020c); }
        
        .ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(8, 8, 18, 0.94); backdrop-filter: blur(18px);
            border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 32px;
            padding: 22px; color: white; min-width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            transition: transform 0.4s cubic-bezier(0.2,0.9,0.4,1), opacity 0.3s;
            transform-origin: top left; max-height: 85vh; overflow-y: auto;
            scrollbar-width: thin;
        }
        .ui-panel::-webkit-scrollbar { width: 4px; }
        .ui-panel::-webkit-scrollbar-track { background: #2a2a3a; border-radius: 10px; }
        .ui-panel::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }
        .ui-panel.closed { transform: scale(0.85) translateX(-140%); opacity: 0; pointer-events: none; visibility: hidden; }
        .ui-panel h2 { margin-bottom: 18px; font-size: 1.5rem; background: linear-gradient(135deg, #00d4ff, #b0f0ff); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .control-group { margin-bottom: 22px; }
        .control-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #c0c8e6; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .part-selector { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px; }
        .part-btn { padding: 6px 12px; border: 1px solid rgba(0,212,255,0.5); background: rgba(0,0,0,0.6); color: #eef; border-radius: 40px; cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s; backdrop-filter: blur(4px); }
        .part-btn:hover, .part-btn.active { background: #00d4ff40; border-color: #00d4ff; color: white; box-shadow: 0 0 10px #00d4ffaa; }
        .color-palette { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .color-btn { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .color-btn:hover { transform: scale(1.08); border-color: white; }
        .color-btn.active { border-color: #00d4ff; box-shadow: 0 0 16px #00d4ff; transform: scale(1.05); }
        .slider-container { display: flex; align-items: center; gap: 14px; }
        input[type="range"] { flex: 1; height: 5px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #00d4ff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #00d4ff; }
        .value-display { min-width: 48px; text-align: right; font-family: monospace; color: #00d4ff; font-weight: bold; background: #00000066; padding: 4px 12px; border-radius: 30px; font-size: 13px; }
        .action-buttons { display: flex; gap: 12px; margin-top: 25px; }
        .btn { flex: 1; padding: 10px 0; border: none; border-radius: 44px; background: linear-gradient(135deg, #2c3e66, #1a2a44); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 12px; letter-spacing: 1.2px; box-shadow: 0 4px 14px rgba(0,0,0,0.5); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn.secondary { background: linear-gradient(135deg, #e65c00, #f9a602); }
        .btn.dance { background: linear-gradient(135deg, #ff3b6f, #ff9a5c); }
        .ui-toggle {
            position: absolute; top: 20px; left: 20px; width: 52px; height: 52px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(14px);
            border: 1px solid #00d4ff; border-radius: 28px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #00d4ff; transition: all 0.3s; z-index: 20;
            box-shadow: 0 8px 22px rgba(0,0,0,0.7);
        }
        .ui-toggle:hover { transform: scale(1.06); background: #00d4ff20; }
        .ui-toggle svg { transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); }
        .ui-toggle.closed svg { transform: rotate(180deg); }
        .info-badge { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); padding: 8px 20px; border-radius: 40px; font-size: 12px; color: #ddd; border-left: 3px solid #00d4ff; pointer-events: none; font-weight: 500; }
        .loading-screen { position: fixed; inset: 0; background: #020210; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.6s ease; }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loader { width: 64px; height: 64px; border: 4px solid #00d4ff30; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 22px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #00d4ff; font-size: 18px; letter-spacing: 5px; font-weight: 700; text-shadow: 0 0 12px #00d4ff; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
<div id="canvas-container"></div>

<button class="ui-toggle" id="ui-toggle" title="Toggle Panel">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"></polyline></svg>
</button>

<div class="ui-panel" id="ui-panel">
    <h2>✨ FULL AVATAR</h2>
    <div class="control-group">
        <label>🧍 BODY PART</label>
        <div class="part-selector">
            <button class="part-btn active" data-part="torso">Torso</button>
            <button class="part-btn" data-part="head">Head</button>
            <button class="part-btn" data-part="neck">Neck</button>
            <button class="part-btn" data-part="leftArm">L Arm</button>
            <button class="part-btn" data-part="rightArm">R Arm</button>
            <button class="part-btn" data-part="leftLeg">L Leg</button>
            <button class="part-btn" data-part="rightLeg">R Leg</button>
        </div>
    </div>
    <div class="control-group">
        <label>🎨 COLOR</label>
        <div id="color-palette" class="color-palette">
            <button class="color-btn active" style="background:#ffdbac" data-color="0xffdbac"></button>
            <button class="color-btn" style="background:#f1c27d" data-color="0xf1c27d"></button>
            <button class="color-btn" style="background:#e0ac69" data-color="0xe0ac69"></button>
            <button class="color-btn" style="background:#c68642" data-color="0xc68642"></button>
            <button class="color-btn" style="background:#8d5524" data-color="0x8d5524"></button>
            <button class="color-btn" style="background:#ff6b6b" data-color="0xff6b6b"></button>
            <button class="color-btn" style="background:#4ecdc4" data-color="0x4ecdc4"></button>
            <button class="color-btn" style="background:#45b7d1" data-color="0x45b7d1"></button>
            <button class="color-btn" style="background:#96ceb4" data-color="0x96ceb4"></button>
            <button class="color-btn" style="background:#2d3436" data-color="0x2d3436"></button>
            <button class="color-btn" style="background:#fd79a8" data-color="0xfd79a8"></button>
        </div>
    </div>
    <div class="control-group">
        <label>⚡ ANIM SPEED</label>
        <div class="slider-container"><input type="range" id="speed-slider" min="0" max="2" step="0.05" value="1"><span class="value-display" id="speed-value">1.0x</span></div>
    </div>
    <div class="control-group">
        <label>📏 SCALE</label>
        <div class="slider-container"><input type="range" id="scale-slider" min="0.5" max="1.4" step="0.02" value="1"><span class="value-display" id="scale-value">1.0</span></div>
    </div>
    <div class="action-buttons">
        <button class="btn" id="anim-idle">Idle</button>
        <button class="btn secondary" id="anim-walk">Walk</button>
        <button class="btn dance" id="anim-dance">Dance</button>
    </div>
</div>
<div class="info-badge">🖱️ Drag Rotate | Right Pan | Scroll Zoom | 👀 Mouse tracks head</div>
<div class="loading-screen" id="loading"><div class="loader"></div><div class="loading-text">LOADING AVATAR</div></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

    // ---- setup ----
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.FogExp2(0x050510, 0.008);
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5.2, 5.5, 7.5);
    camera.lookAt(0, 3.5, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 1.0;
    controls.zoomSpeed = 1.2;
    controls.minDistance = 2.5;
    controls.maxDistance = 15;
    controls.target.set(0, 3.5, 0);

    // Lighting
    const ambient = new THREE.AmbientLight(0x5a5a8a, 0.55);
    scene.add(ambient);
    const keyLight = new THREE.DirectionalLight(0xfff0e0, 1.05);
    keyLight.position.set(4, 9, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 22;
    keyLight.shadow.camera.left = -6;
    keyLight.shadow.camera.right = 6;
    keyLight.shadow.camera.top = 6;
    keyLight.shadow.camera.bottom = -6;
    scene.add(keyLight);
    const fillLight = new THREE.PointLight(0x6688ee, 0.45);
    fillLight.position.set(-3, 5, 3.5);
    scene.add(fillLight);
    const rimLight = new THREE.PointLight(0xffaa77, 0.5);
    rimLight.position.set(2, 4.5, -5.5);
    scene.add(rimLight);
    
    // ground
    const grid = new THREE.GridHelper(38, 32, 0x3a8cbf, 0x2a5570);
    grid.position.y = 0.02;
    grid.material.transparent = true;
    grid.material.opacity = 0.3;
    scene.add(grid);
    const groundPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(32, 32),
        new THREE.MeshStandardMaterial({ color: 0x0c0c1c, roughness: 0.7, metalness: 0.05, transparent: true, opacity: 0.3 })
    );
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = -0.02;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);
    
    // particles
    const pCount = 800;
    const particleGeo = new THREE.BufferGeometry();
    const particlePos = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount; i++) {
        particlePos[i*3] = (Math.random() - 0.5) * 45;
        particlePos[i*3+1] = Math.random() * 7.5;
        particlePos[i*3+2] = (Math.random() - 0.5) * 35;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x77ccff, size: 0.04, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);
    
    // ----- geometry helpers (organic shapes) -----
    function createTaperedCylinder(topRad, bottomRad, height, radialSegs = 32, heightSegs = 28, bulge = 0.03) {
        const geometry = new THREE.CylinderGeometry(topRad, bottomRad, height, radialSegs, heightSegs);
        const positions = geometry.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
            let x = positions[i];
            let y = positions[i+1];
            let z = positions[i+2];
            const t = (y + height/2) / height;
            const curve = 1 + Math.sin(t * Math.PI) * bulge;
            positions[i] = x * curve;
            positions[i+2] = z * curve;
        }
        geometry.computeVertexNormals();
        return geometry;
    }
    
    function createRoundedTorso(width, height, depth, segments, radius) {
        const geometry = new RoundedBoxGeometry(width, height, depth, segments, radius);
        return geometry;
    }

    function createSmoothNeck(height, topRad, bottomRad) {
        const geometry = new THREE.CylinderGeometry(topRad, bottomRad, height, 32, 24);
        const positions = geometry.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
            let x = positions[i];
            let y = positions[i+1];
            let z = positions[i+2];
            const t = (y + height/2) / height;
            const curve = 1 + Math.sin(t * Math.PI) * 0.02;
            positions[i] = x * curve;
            positions[i+2] = z * curve;
        }
        geometry.computeVertexNormals();
        return geometry;
    }

    function createSmoothHead() {
        const geometry = new THREE.SphereGeometry(0.68, 40, 40);
        const positions = geometry.attributes.position.array;
        
        for (let i = 0; i < positions.length; i += 3) {
            let x = positions[i];
            let y = positions[i+1];
            let z = positions[i+2];
            
            if (y > 0) {
                positions[i+1] *= 1.08;
            }
            
            if (y < -0.3) {
                const taper = 1 - (-0.3 - y) * 0.3;
                const t = Math.max(0.88, taper);
                positions[i] *= t;
                positions[i+2] *= t;
            }
            
            if (z < 0) {
                positions[i+2] *= 0.94;
            }
        }
        geometry.computeVertexNormals();
        return geometry;
    }
    
    // ----- Full Character -----
    class FullCharacter {
        constructor() {
            this.mesh = new THREE.Group();
            this.parts = {};
            this.materials = {};
            this.joints = {};
            this.currentAnim = 'idle';
            this.animTime = 0;
            this.speed = 1;
            this.skinColor = 0xffdbac;
            this.shirtColor = 0x2b7a6e;
            this.pantsColor = 0x2c3e50;
            this.mouseTarget = new THREE.Vector2(0, 0);
            this.headRotation = new THREE.Vector2(0, 0);
            this.build();
        }
        
        addMesh(geometry, color, name, parent, pos, roughnessVal = 0.42) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: roughnessVal, metalness: 0.03 });
            const mesh = new THREE.Mesh(geometry, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.copy(pos);
            this.materials[name] = mesh.material;
            this.parts[name] = mesh;
            if (parent) parent.add(mesh);
            return mesh;
        }
        
        build() {
            const skin = this.skinColor;
            const shirt = this.shirtColor;
            const pants = this.pantsColor;
            
            // ---- TORSO (RoundedBox) ----
            const torsoHeight = 2.38;
            const torsoCenterY = 3.20;
            const torsoTopY = torsoCenterY + torsoHeight/2;
            const torsoBottomY = torsoCenterY - torsoHeight/2;
            
            const torsoGeo = createRoundedTorso(1.6, 2.38, 1.0, 8, 0.5);
            const torso = this.addMesh(torsoGeo, shirt, 'torso', this.mesh, new THREE.Vector3(0, torsoCenterY, 0), 0.48);
            
            // ---- NECK (shorter, slightly thicker top) ----
            const neckHeight = 0.52;    // was 0.62, shorter
            const neckEmbed = 0.16;
            const neckTopY = torsoTopY + neckHeight - neckEmbed;
            const neckGeo = createSmoothNeck(neckHeight, 0.16, 0.17);  // top 0.16 (was 0.14), bottom 0.17 (was 0.18)
            const neck = this.addMesh(neckGeo, skin, 'neck', this.mesh, new THREE.Vector3(0, torsoTopY + neckHeight/2 - neckEmbed, 0), 0.40);
            
            // ---- HEAD (smaller) ----
            const headGeo = createSmoothHead();
            const head = this.addMesh(headGeo, skin, 'head', this.mesh, new THREE.Vector3(0, neckTopY + 0.48, 0.02), 0.38); // was 0.52
            this.joints.head = head;
            
            // ---- ARMS (slimmer) ----
            const upperArmLen = 1.22;
            const lowerArmLen = 1.10;
            const upperRad = 0.28;
            const lowerRad = 0.22;
            const shoulderY = torsoTopY - 0.08;
            const armOffsetX = 0.95;
            
            // Left arm
            const leftArmGroup = new THREE.Group();
            leftArmGroup.position.set(-armOffsetX, shoulderY, 0);
            const upperArmGeo = createTaperedCylinder(upperRad, upperRad-0.03, upperArmLen, 28, 24, 0.04);
            const leftUpper = this.addMesh(upperArmGeo, skin, 'leftArm', leftArmGroup, new THREE.Vector3(0, -upperArmLen/2, 0), 0.42);
            const leftElbowGroup = new THREE.Group();
            leftElbowGroup.position.set(0, -upperArmLen, 0);
            const lowerArmGeo = createTaperedCylinder(lowerRad, lowerRad-0.03, lowerArmLen, 26, 22, 0.03);
            const leftLower = this.addMesh(lowerArmGeo, skin, 'leftForearm', leftElbowGroup, new THREE.Vector3(0, -lowerArmLen/2, 0), 0.42);
            leftArmGroup.add(leftElbowGroup);
            this.mesh.add(leftArmGroup);
            this.joints.leftArm = leftArmGroup;
            this.joints.leftElbow = leftElbowGroup;
            
            // Right arm
            const rightArmGroup = new THREE.Group();
            rightArmGroup.position.set(armOffsetX, shoulderY, 0);
            const rightUpper = this.addMesh(upperArmGeo, skin, 'rightArm', rightArmGroup, new THREE.Vector3(0, -upperArmLen/2, 0), 0.42);
            const rightElbowGroup = new THREE.Group();
            rightElbowGroup.position.set(0, -upperArmLen, 0);
            const rightLower = this.addMesh(lowerArmGeo, skin, 'rightForearm', rightElbowGroup, new THREE.Vector3(0, -lowerArmLen/2, 0), 0.42);
            rightArmGroup.add(rightElbowGroup);
            this.mesh.add(rightArmGroup);
            this.joints.rightArm = rightArmGroup;
            this.joints.rightElbow = rightElbowGroup;
            
            // ---- LEGS (embedded into torso, tightened lengths) ----
            const legEmbed = 0.18;
            const thighLen = 1.42;
            const calfLen = 1.22;
            const thighRad = 0.36;
            const calfRad = 0.27;
            const hipY = torsoBottomY + legEmbed;
            const legOffsetX = 0.44;
            
            // Left leg
            const leftLegGroup = new THREE.Group();
            leftLegGroup.position.set(-legOffsetX, hipY, 0);
            const thighGeo = createTaperedCylinder(thighRad, thighRad-0.05, thighLen, 30, 26, 0.05);
            const leftThigh = this.addMesh(thighGeo, pants, 'leftLeg', leftLegGroup, new THREE.Vector3(0, -thighLen/2, 0), 0.5);
            const leftKneeGroup = new THREE.Group();
            leftKneeGroup.position.set(0, -thighLen, 0);
            const calfGeo = createTaperedCylinder(calfRad, calfRad-0.04, calfLen, 28, 24, 0.03);
            const leftCalf = this.addMesh(calfGeo, pants, 'leftCalf', leftKneeGroup, new THREE.Vector3(0, -calfLen/2, 0), 0.5);
            leftLegGroup.add(leftKneeGroup);
            this.mesh.add(leftLegGroup);
            this.joints.leftLeg = leftLegGroup;
            this.joints.leftKnee = leftKneeGroup;
            
            // Right leg
            const rightLegGroup = new THREE.Group();
            rightLegGroup.position.set(legOffsetX, hipY, 0);
            const rightThigh = this.addMesh(thighGeo, pants, 'rightLeg', rightLegGroup, new THREE.Vector3(0, -thighLen/2, 0), 0.5);
            const rightKneeGroup = new THREE.Group();
            rightKneeGroup.position.set(0, -thighLen, 0);
            const rightCalf = this.addMesh(calfGeo, pants, 'rightCalf', rightKneeGroup, new THREE.Vector3(0, -calfLen/2, 0), 0.5);
            rightLegGroup.add(rightKneeGroup);
            this.mesh.add(rightLegGroup);
            this.joints.rightLeg = rightLegGroup;
            this.joints.rightKnee = rightKneeGroup;
            
            this.materials.leftForearm = leftLower.material;
            this.materials.rightForearm = rightLower.material;
            this.materials.leftCalf = leftCalf.material;
            this.materials.rightCalf = rightCalf.material;
        }
        
        setPartColor(partName, hexColor) {
            const col = new THREE.Color(hexColor);
            const map = {
                torso: ['torso'],
                head: ['head'],
                neck: ['neck'],
                leftArm: ['leftArm', 'leftForearm'],
                rightArm: ['rightArm', 'rightForearm'],
                leftLeg: ['leftLeg', 'leftCalf'],
                rightLeg: ['rightLeg', 'rightCalf']
            };
            (map[partName] || [partName]).forEach(key => {
                if (this.materials[key]) this.materials[key].color.copy(col);
            });
        }
        
        setAnimation(type) {
            this.currentAnim = type;
            this.animTime = 0;
            if (this.joints.leftArm) this.joints.leftArm.rotation.set(0, 0, 0);
            if (this.joints.rightArm) this.joints.rightArm.rotation.set(0, 0, 0);
            if (this.joints.leftLeg) this.joints.leftLeg.rotation.set(0, 0, 0);
            if (this.joints.rightLeg) this.joints.rightLeg.rotation.set(0, 0, 0);
            if (this.joints.leftElbow) this.joints.leftElbow.rotation.set(0, 0, 0);
            if (this.joints.rightElbow) this.joints.rightElbow.rotation.set(0, 0, 0);
            if (this.joints.leftKnee) this.joints.leftKnee.rotation.set(0, 0, 0);
            if (this.joints.rightKnee) this.joints.rightKnee.rotation.set(0, 0, 0);
            this.mesh.position.y = 0;
        }
        
        update(delta) {
            this.animTime += delta * this.speed;
            const t = this.animTime;
            
            const targetX = this.mouseTarget.x * 0.5;
            const targetY = this.mouseTarget.y * 0.35;
            this.headRotation.x += (targetX - this.headRotation.x) * 5 * delta;
            this.headRotation.y += (targetY - this.headRotation.y) * 5 * delta;
            
            if (this.joints.head) {
                this.joints.head.rotation.y = this.headRotation.x;
                this.joints.head.rotation.x = -this.headRotation.y;
            }
            
            const breath = Math.sin(t * 1.5) * 0.015;
            const torsoBaseY = 3.20;
            const torsoTopY = torsoBaseY + 2.38/2;
            const neckHeight = 0.52;
            const neckEmbed = 0.16;
            const neckTopY = torsoTopY + neckHeight - neckEmbed;
            
            if (this.parts.torso) this.parts.torso.position.y = torsoBaseY + breath;
            if (this.parts.neck) this.parts.neck.position.y = torsoTopY + neckHeight/2 - neckEmbed + breath * 0.6;
            if (this.joints.head) this.joints.head.position.y = neckTopY + 0.48 + breath * 0.4;
            
            if (this.currentAnim === 'idle') {
                if (this.joints.leftArm) {
                    this.joints.leftArm.rotation.z = Math.sin(t * 1.3) * 0.04;
                    this.joints.leftArm.rotation.x = Math.sin(t * 0.7) * 0.02;
                }
                if (this.joints.rightArm) {
                    this.joints.rightArm.rotation.z = -Math.sin(t * 1.3) * 0.04;
                    this.joints.rightArm.rotation.x = Math.sin(t * 0.7 + 1) * 0.02;
                }
            } else if (this.currentAnim === 'walk') {
                const ws = 5.2;
                this.joints.leftArm.rotation.x = Math.sin(t * ws) * 0.95;
                this.joints.rightArm.rotation.x = Math.sin(t * ws + Math.PI) * 0.95;
                this.joints.leftLeg.rotation.x = Math.sin(t * ws + Math.PI) * 0.68;
                this.joints.rightLeg.rotation.x = Math.sin(t * ws) * 0.68;
                this.joints.leftElbow.rotation.x = -Math.max(0, Math.sin(t * ws + Math.PI)) * 0.6;
                this.joints.rightElbow.rotation.x = -Math.max(0, Math.sin(t * ws)) * 0.6;
                this.joints.leftKnee.rotation.x = Math.max(0, Math.sin(t * ws + Math.PI)) * 0.5;
                this.joints.rightKnee.rotation.x = Math.max(0, Math.sin(t * ws)) * 0.5;
                this.mesh.position.y = Math.abs(Math.sin(t * ws * 2)) * 0.065;
            } else if (this.currentAnim === 'dance') {
                const ds = 5.3;
                this.joints.leftArm.rotation.x = Math.sin(t * ds) * 0.65 - 2.15;
                this.joints.rightArm.rotation.x = Math.sin(t * ds + 2.3) * 0.65 - 2.15;
                this.joints.leftElbow.rotation.x = -0.8 - Math.sin(t * ds * 2) * 0.2;
                this.joints.rightElbow.rotation.x = -0.8 - Math.sin(t * ds * 2 + Math.PI) * 0.2;
                this.mesh.position.y = Math.abs(Math.sin(t * ds * 1.4)) * 0.18;
                this.joints.leftLeg.rotation.x = Math.sin(t * ds) * 0.45;
                this.joints.rightLeg.rotation.x = Math.sin(t * ds + Math.PI) * 0.45;
                this.joints.leftKnee.rotation.x = 0.5 + Math.sin(t * ds * 1.5) * 0.3;
                this.joints.rightKnee.rotation.x = 0.5 + Math.sin(t * ds * 1.5 + Math.PI) * 0.3;
            }
        }
        
        setScale(s) { this.mesh.scale.setScalar(s); }
    }
    
    const character = new FullCharacter();
    scene.add(character.mesh);
    
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 2 - 1;
        const y = (e.clientY / window.innerHeight) * 2 - 1;
        character.mouseTarget.set(x, -y);
    });
    
    const uiPanel = document.getElementById('ui-panel');
    const uiToggle = document.getElementById('ui-toggle');
    let open = true;
    uiToggle.onclick = () => {
        open = !open;
        uiPanel.classList.toggle('closed', !open);
        uiToggle.classList.toggle('closed', !open);
    };
    
    let selectedPart = 'torso';
    document.querySelectorAll('.part-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            selectedPart = e.target.dataset.part;
        });
    });
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            character.setPartColor(selectedPart, parseInt(e.target.dataset.color));
        });
    });
    
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-value');
    speedSlider.oninput = (e) => { character.speed = parseFloat(e.target.value); speedVal.innerText = character.speed.toFixed(1)+'x'; };
    const scaleSlider = document.getElementById('scale-slider');
    const scaleVal = document.getElementById('scale-value');
    scaleSlider.oninput = (e) => { character.setScale(parseFloat(e.target.value)); scaleVal.innerText = parseFloat(e.target.value).toFixed(2); };
    document.getElementById('anim-idle').onclick = () => character.setAnimation('idle');
    document.getElementById('anim-walk').onclick = () => character.setAnimation('walk');
    document.getElementById('anim-dance').onclick = () => character.setAnimation('dance');
    
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1100);
    
    const clock = new THREE.Clock();
    function animate() {
        const delta = Math.min(clock.getDelta(), 0.033);
        character.update(delta);
        particles.rotation.y += 0.002;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
