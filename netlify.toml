[build]
  command = "npm run build:client"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  # WebSocket connections cannot be proxied by Netlify, so the client
  # connects to the Render.com backend directly for /ws.
  # REST API calls go through the Netlify proxy below (same-origin, no CORS).
  VITE_API_URL = "https://rebur.onrender.com"

# ── Cache headers ────────────────────────────────────────────────────────────
# index.html and everything else: never cache — always fetch fresh.
# `private` tells shared/CDN caches this response is not for them.
# `Netlify-CDN-Cache-Control` is Netlify's own CDN kill-switch and takes
# priority over Cache-Control for their edge nodes.
# `Surrogate-Control` covers Fastly/Varnish layers.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private, max-age=0"
    Pragma = "no-cache"
    Expires = "0"
    Netlify-CDN-Cache-Control = "no-store, max-age=0"
    Surrogate-Control = "no-store"
    CDN-Cache-Control = "no-store, max-age=0"

# Hashed assets (e.g. /assets/index-AbCd1234.js) can be cached forever
# because the filename changes every build.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Proxy every /api/* and /uploads/* call to the Render backend.
# The browser sees a same-origin request — zero CORS issues for REST.
# These rules MUST come BEFORE the SPA catch-all below.
[[redirects]]
  from = "/api/*"
  to = "https://rebur.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://rebur.onrender.com/uploads/:splat"
  status = 200
  force = true

# SPA fallback — all non-file, non-api paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
