services:
  - type: web
    name: rebur-engine
    runtime: node
    region: oregon
    plan: free
    buildCommand: rm -rf node_modules package-lock.json && npm cache clean --force && npm install
 && npm run build:server && npm run build:client
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_ONLY
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
