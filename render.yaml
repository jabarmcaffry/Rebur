services:
  - type: web
    name: rebur-engine
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:server
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_ONLY
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: rebur-engine-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://www.rebur.co

databases:
  - name: rebur-engine-db
    plan: free
    region: oregon
